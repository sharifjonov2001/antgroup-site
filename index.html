  faylning ENG OXIRIGA, </body> yozuvidan OLDIN shu butun
  blokni joylashtiring (paste qiling). Boshqa hech narsani
  o'zgartirish shart emas.

<style>
.callback-fab{
  position:fixed;right:24px;bottom:24px;z-index:900;
  background:#0E4A3F;color:#fff;border:none;border-radius:999px;
  padding:14px 22px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;
  box-shadow:0 18px 34px -14px rgba(14,74,63,.5);cursor:pointer;transition:transform .25s ease,background .25s ease;
  font-family:inherit;
}
.callback-fab:hover{transform:translateY(-3px);background:#16665A;}
.callback-fab svg{width:18px;height:18px;flex-shrink:0;}
@media (max-width:600px){
  .callback-fab{right:14px;bottom:14px;padding:0;width:52px;height:52px;border-radius:50%;justify-content:center;}
  .callback-fab span{display:none;}
}
.lead-modal-overlay{
  position:fixed;inset:0;background:rgba(14,36,32,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:24px;z-index:1000;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
.lead-modal-overlay.open{opacity:1;pointer-events:auto;}
.lead-modal{
  background:#fff;max-width:420px;width:100%;border-radius:18px;padding:28px 26px 32px;position:relative;
  transform:scale(.94) translateY(16px);transition:transform .35s cubic-bezier(.2,.7,.2,1);
  font-family:inherit;
}
.lead-modal-overlay.open .lead-modal{transform:scale(1) translateY(0);}
.lead-modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:#f0f0f0;border:none;cursor:pointer;font-size:16px;color:#333;}
.lead-modal-close:hover{background:#e0a33d;color:#fff;}
.lead-form{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
.lead-form label{font-size:13px;font-weight:600;color:#0E4A3F;margin-bottom:4px;display:block;}
.lead-form input{
  width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(14,74,63,.18);
  background:#EAF3FB;color:#123;font-size:14px;font-family:inherit;box-sizing:border-box;
}
.lead-form input:focus{outline:none;border-color:#16665A;}
.lead-form button{
  margin-top:6px;background:#0E4A3F;color:#fff;border:none;border-radius:999px;
  padding:13px 20px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;
}
.lead-form button:hover{background:#16665A;}
.lead-form button:disabled{opacity:.6;cursor:not-allowed;}
.lead-success{display:none;text-align:center;padding:10px 0;}
.lead-success.show{display:block;}
.lead-success .ok-icon{width:52px;height:52px;border-radius:50%;background:#E3F6E6;color:#16665A;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.lead-success .ok-icon svg{width:26px;height:26px;}
</style>

<!-- Suzuvchi "Qo'ng'iroq so'rash" tugmasi -->
<button type="button" class="callback-fab" id="callbackFabBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
  <span>Qo'ng'iroq so'rash</span>
</button>

<!-- Forma oynasi -->
<div class="lead-modal-overlay" id="leadModalOverlay">
  <div class="lead-modal">
    <button class="lead-modal-close" id="leadCloseBtn">&times;</button>
    <h3 style="color:#0E4A3F;margin:0 0 6px;">Qo'ng'iroq so'rash</h3>
    <p style="color:#666;font-size:13.5px;margin:0;">Ismingiz va telefon raqamingizni qoldiring — mutaxassislarimiz tez orada siz bilan bog'lanadi.</p>
    <form class="lead-form" id="leadForm">
      <div>
        <label>Ismingiz</label>
        <input type="text" id="leadName" required autocomplete="name">
      </div>
      <div>
        <label>Telefon raqamingiz</label>
        <input type="tel" id="leadPhone" placeholder="+998 90 123 45 67" required autocomplete="tel">
      </div>
      <button type="submit" id="leadSubmitBtn">Yuborish</button>
    </form>
    <div class="lead-success" id="leadSuccess">
      <div class="ok-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>
      <div style="color:#0E4A3F;font-weight:700;margin-bottom:4px;">Qabul qilindi!</div>
      <div style="color:#666;font-size:13.5px;">Tez orada siz bilan bog'lanamiz.</div>
    </div>
  </div>
</div>

<script>
/* ===== TELEGRAM BOT SOZLAMALARI ===== */
/* Bu ikkita qiymat allaqachon sizning bot va chat ma'lumotlaringiz bilan to'ldirilgan */
var TG_BOT_TOKEN = "8994353115:AAHEz4sHx2c8ksf3a0VswGYSea44T1PZ7KY";
var TG_CHAT_ID = "924394456";

(function(){
  var overlay = document.getElementById("leadModalOverlay");
  var fabBtn = document.getElementById("callbackFabBtn");
  var closeBtn = document.getElementById("leadCloseBtn");
  var form = document.getElementById("leadForm");
  var success = document.getElementById("leadSuccess");
  var submitBtn = document.getElementById("leadSubmitBtn");

  function openModal(){
    overlay.classList.add("open");
    form.style.display = "flex";
    success.classList.remove("show");
    form.reset();
  }
  function closeModal(){
    overlay.classList.remove("open");
  }

  fabBtn.addEventListener("click", openModal);
  closeBtn.addEventListener("click", closeModal);
  overlay.addEventListener("click", function(e){ if(e.target === overlay) closeModal(); });

  form.addEventListener("submit", function(e){
    e.preventDefault();
    var name = document.getElementById("leadName").value.trim();
    var phone = document.getElementById("leadPhone").value.trim();
    if(!name || !phone) return;

    submitBtn.disabled = true;
    submitBtn.textContent = "Yuborilmoqda...";

    var text = "📞 Yangi qo'ng'iroq so'rovi (saytdan)\n\n" +
               "👤 Ism: " + name + "\n" +
               "📱 Telefon: " + phone + "\n" +
               "🕒 Vaqt: " + new Date().toLocaleString("uz-UZ");

    fetch("https://api.telegram.org/bot" + TG_BOT_TOKEN + "/sendMessage", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text })
    })
    .then(function(res){ return res.json(); })
    .then(function(data){
      if(data.ok){
        form.style.display = "none";
        success.classList.add("show");
      } else {
        alert("Xatolik yuz berdi. Iltimos, qayta urining yoki bizga qo'ng'iroq qiling.");
      }
    })
    .catch(function(){
      alert("Xatolik yuz berdi. Iltimos, qayta urining yoki bizga qo'ng'iroq qiling.");
    })
    .finally(function(){
      submitBtn.disabled = false;
      submitBtn.textContent = "Yuborish";
    });
  });
})();
</script>
